<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Join | LunaFlow</title>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="logo">LUNAFLOW</div>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">Science</a></li>
                <li><a href="features.html">Features</a></li>
                <li><a href="gallery.html">Aesthetics</a></li>
                <li><a href="contact.html">Join</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <div class="wrapper">
            <h1>Join</h1>
            <form action="#" method="post">
                <div class="input-box">
                    <input type="text" placeholder="Name" name="name" required>
                    <i class='bx bxs-user'></i>
                </div>
                <div class="input-box">
                    <input type="text" placeholder="Email" name="email" required>
                    <i class='bx bxs-envelope'></i>
                </div>
                <div class="input-box">
                    <label for="goal">Primary Goal:</label>
                    <select id="goal" name="goal">
                        <option value="fertility">Fertility Tracking</option>
                        <option value="hormone">Hormonal Balance</option>
                        <option value="fitness">Fitness Optimization</option>
                    </select>
                </div>
                <input type="submit" value="Register">
            </form>
        </div>
    </main>
</body>
</html>
